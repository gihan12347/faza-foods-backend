spring.datasource.url=jdbc:mysql://localhost:3306/fasa_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Receipt PDF: thermal POS paper (80 = standard 80mm roll; 58 = compact)
fasa.orders.receipt.paper-width-mm=80
fasa.orders.receipt.paper-min-height-mm=45
fasa.orders.receipt.paper-max-height-mm=600

# Dashboard: when false, DELIVERED does not open the WhatsApp confirmation (order still saves).
fasa.dashboard.whatsapp.prompt-on-delivered=false

# Bootstrap user for first login (password is stored as BCrypt hash in DB)
app.security.bootstrap.username=admin
app.security.bootstrap.password=ChangeMe123!
app.security.bootstrap.role=ADMIN

#ehcache
spring.cache.jcache.config=classpath:ehcache.xml
spring.cache.type=jcache
