<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<header class="topbar" th:fragment="header">
    <div class="topbar__inner">
        <div class="brand" aria-label="Fasa Products">
            <span class="brand__mark" aria-hidden="true">
                <img src="/images/fasa-logo.png" alt="Fasa Products logo" class="brand__logo"/>
            </span>
        </div>
        <form th:action="@{/logout}" method="post" class="logout-form">
            <button type="submit" class="btn btn--logout" aria-label="Logout">Logout</button>
        </form>
    </div>
</header>
</body>
</html>
