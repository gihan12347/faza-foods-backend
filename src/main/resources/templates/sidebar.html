<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<aside class="sidebar" th:fragment="sidebar (active)">
    <div class="sidebar__title">Menu</div>
    <nav class="sidebar__nav" aria-label="Dashboard navigation">
        <a th:href="@{/dashboard}" class="sidebar__link" th:classappend="${active} == 'all' ? ' is-active' : ''">All orders</a>
        <a th:href="@{/dashboard(status='PENDING')}" class="sidebar__link" th:classappend="${active} == 'pending' ? ' is-active' : ''">Pending orders</a>
        <a th:href="@{/dashboard(status='PROCESSING')}" class="sidebar__link" th:classappend="${active} == 'processing' ? ' is-active' : ''">Processing orders</a>
        <a th:href="@{/dashboard(status='DELIVERED')}" class="sidebar__link" th:classappend="${active} == 'delivered' ? ' is-active' : ''">Delivered orders</a>
        <a th:href="@{/dashboard(status='DONE')}" class="sidebar__link" th:classappend="${active} == 'done' ? ' is-active' : ''">Done orders</a>
        <a th:href="@{/dashboard(status='REJECT')}" class="sidebar__link" th:classappend="${active} == 'reject' ? ' is-active' : ''">Reject orders</a>
        <a th:href="@{/users}" class="sidebar__link" th:classappend="${active} == 'users' ? ' is-active' : ''">User management</a>
    </nav>
</aside>
</body>
</html>
